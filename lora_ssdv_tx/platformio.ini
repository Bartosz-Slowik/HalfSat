; XIAO ESP32-S3 + Wio-SX1262 — SSDV LoRa transmitter (chip #1).
; Open this folder as the PlatformIO project root.

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_src_filter = +<src/*.cpp> -<src/spi_master_link.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I../lib
lib_extra_dirs = ../lib
lib_deps =
    jgromes/RadioLib @ ^6.6.0
