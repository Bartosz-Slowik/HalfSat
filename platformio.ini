; Monorepo: two firmwares. Pick env or open lora_ssdv_tx / sense_camera_http as separate PIO projects.
; Camera link UART: default XIAO D2↔D2 & D5↔D5 + GND (GPIO3/6). Same -D overrides on *both* envs.
; Sources live in subfolders; filters are relative to default src/ (see build_src_filter docs).

[platformio]
default_envs = sense_camera_http

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
lib_extra_dirs = lib
build_src_filter = +<../lora_ssdv_tx/src/*.cpp> -<../lora_ssdv_tx/src/spi_master_link.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Ilib
lib_deps =
    jgromes/RadioLib @ ^6.6.0

[env:sense_camera_http]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.sdkconfig_defaults = sense_sdkconfig.defaults
build_src_filter = +<../sense_camera_http/src/*.cpp> -<../sense_camera_http/src/spi_slave_link.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -Ilib
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
lib_deps =
    espressif/esp32-camera @ ^2.0.4
