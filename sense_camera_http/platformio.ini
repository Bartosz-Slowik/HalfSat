; XIAO ESP32-S3 Sense — camera + UART export to LoRa (no WiFi / HTTP).
; Open this folder as the PlatformIO project root (not the parent ssdv folder).

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.sdkconfig_defaults = ../sense_sdkconfig.defaults
build_src_filter = +<src/*.cpp> -<src/spi_slave_link.cpp>
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -I../lib
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
lib_deps =
    espressif/esp32-camera @ ^2.0.4
